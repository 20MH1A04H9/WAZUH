# =============================================================================
# Demo Microservices — opentelemetry-demo subset
# Generates real traces, metrics, and logs flowing into Wazuh via OTel Collector
#
# Services:
#   frontend        — HTTP gateway (Python Flask + OTel SDK)
#   order-service   — Order processing (Node.js + OTel SDK)
#   inventory       — Inventory lookup (Go + OTel SDK)
#   redis           — Cache backend
#   load-generator  — Continuous synthetic traffic
# =============================================================================

# ── Redis (cache backend, no instrumentation needed) ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: wazuh-demo
  labels:
    app: redis
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: wazuh-demo
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# ── Frontend service (uses opentelemetry-demo image) ─────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-demo-frontend
  namespace: wazuh-demo
  labels:
    app: opentelemetry-demo-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: opentelemetry-demo-frontend
  template:
    metadata:
      labels:
        app: opentelemetry-demo-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/open-telemetry/demo:latest-frontend
          ports:
            - containerPort: 8080
          env:
            - name: OTEL_SERVICE_NAME
              value: "frontend"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc.cluster.local:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=demo,service.version=1.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetry-demo-frontend
  namespace: wazuh-demo
spec:
  selector:
    app: opentelemetry-demo-frontend
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080

---
