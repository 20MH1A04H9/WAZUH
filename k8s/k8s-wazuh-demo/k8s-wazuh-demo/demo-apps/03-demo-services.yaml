# ── Load generator — continuous synthetic traffic ─────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-demo-loadgenerator
  namespace: wazuh-demo
  labels:
    app: opentelemetry-demo-loadgenerator
    tier: tools
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opentelemetry-demo-loadgenerator
  template:
    metadata:
      labels:
        app: opentelemetry-demo-loadgenerator
    spec:
      containers:
        - name: loadgenerator
          image: ghcr.io/open-telemetry/demo:latest-loadgenerator
          env:
            - name: FRONTEND_ADDR
              value: "opentelemetry-demo-frontend:8080"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.monitoring.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "loadgenerator"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 128Mi
