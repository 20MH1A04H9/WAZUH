# =============================================================================
# Wazuh Connection Secret
# Edit data-prepper-endpoint to point to your Wazuh server IP before applying.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: wazuh-connection
  namespace: monitoring
type: Opaque
stringData:
  # Replace with your Wazuh server IP / hostname
  data-prepper-endpoint: "YOUR_WAZUH_SERVER_IP:21890"
