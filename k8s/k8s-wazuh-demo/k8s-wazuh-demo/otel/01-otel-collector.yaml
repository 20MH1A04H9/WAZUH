# =============================================================================
# OpenTelemetry Collector — Kubernetes Metrics + Traces
# Collects: K8s node/pod/deployment metrics via kubeletstats + k8s_cluster
#           Traces from demo apps via OTLP
# Exports:  Metrics → Prometheus (scraped by node exporter job)
#           Traces  → Wazuh Data Prepper (OTLP gRPC)
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: monitoring
data:
  config.yaml: |
    receivers:

      # ── Kubernetes node / pod / container metrics ──
      kubeletstats:
        collection_interval: 30s
        auth_type: serviceAccount
        endpoint: "https://${env:K8S_NODE_NAME}:10250"
        insecure_skip_verify: true
        metric_groups:
          - node
          - pod
          - container
          - volume
        extra_metadata_labels:
          - container.id

      # ── Kubernetes cluster-level metrics (deployments, replicasets…) ──
      k8s_cluster:
        collection_interval: 30s
        node_conditions_to_report:
          - Ready
          - MemoryPressure
          - DiskPressure
        allocatable_types_to_report:
          - cpu
          - memory
          - storage

      # ── Inbound traces / metrics from demo applications ──
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # ── Prometheus scrape of kube-state-metrics ──
      prometheus:
        config:
          scrape_configs:
            - job_name: kube-state-metrics
              scrape_interval: 30s
              static_configs:
                - targets: ['kube-state-metrics.monitoring.svc.cluster.local:8080']

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1000

      # Enrich all telemetry with K8s metadata
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection

      memory_limiter:
        check_interval: 5s
        limit_mib: 512
        spike_limit_mib: 128

      resourcedetection:
        detectors: [env, k8snode]
        timeout: 5s

    exporters:
      # ── Traces → Wazuh Data Prepper ──
      otlp/data-prepper:
        endpoint: "${env:WAZUH_DATA_PREPPER_ENDPOINT}"
        tls:
          insecure: true

      # ── Metrics → Prometheus exposition (scraped by external Prometheus) ──
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: k8s
        resource_to_telemetry_conversion:
          enabled: true

      # ── Debug (remove in production) ──
      debug:
        verbosity: basic

    service:
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters:  [otlp/data-prepper, debug]

        metrics:
          receivers:  [kubeletstats, k8s_cluster, prometheus, otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, batch]
          exporters:  [prometheus, debug]

      telemetry:
        metrics:
          address: 0.0.0.0:8888

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
    spec:
      serviceAccountName: otel-collector
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.152.0
          args: ["--config=/conf/config.yaml"]
          env:
            - name: K8S_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: WAZUH_DATA_PREPPER_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: wazuh-connection
                  key: data-prepper-endpoint
          ports:
            - containerPort: 4317  # OTLP gRPC
            - containerPort: 4318  # OTLP HTTP
            - containerPort: 8888  # OTel self-metrics
            - containerPort: 8889  # Prometheus exposition
          volumeMounts:
            - name: config
              mountPath: /conf
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: otel-collector-config

---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 8888
      targetPort: 8888
    - name: prom-exposition
      port: 8889
      targetPort: 8889
