# =============================================================================
# NodePort Services — Expose K8s metrics to external Wazuh Prometheus
# These allow the Prometheus on your Wazuh server to scrape K8s metrics
# =============================================================================

# OTel Collector self-metrics → NodePort 30888
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-nodeport
  namespace: monitoring
  labels:
    app: otel-collector
spec:
  type: NodePort
  selector:
    app: otel-collector
  ports:
    - name: self-metrics
      port: 8888
      targetPort: 8888
      nodePort: 30888
    - name: prom-exposition
      port: 8889
      targetPort: 8889
      nodePort: 30889

---
# kube-state-metrics → NodePort 30880
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics-nodeport
  namespace: monitoring
  labels:
    app: kube-state-metrics
spec:
  type: NodePort
  selector:
    app: kube-state-metrics
  ports:
    - name: http-metrics
      port: 8080
      targetPort: 8080
      nodePort: 30880

---
# Demo frontend → NodePort 30080 (access via browser)
apiVersion: v1
kind: Service
metadata:
  name: frontend-nodeport
  namespace: wazuh-demo
spec:
  type: NodePort
  selector:
    app: opentelemetry-demo-frontend
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
